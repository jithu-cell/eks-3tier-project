apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudapp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # SOURCE — your GitHub repo and folder
  source:
    # REPLACE YOUR_USERNAME with your GitHub username
    repoURL: https://github.com/jithu-cell/eks-3tier-project.git
    targetRevision: main
    path: kubernetes

  # DESTINATION — your EKS cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudapp

  # SYNC POLICY — auto deploy when Git changes
  syncPolicy:
    automated:
      prune: true      # delete resources removed from Git
      selfHeal: true   # revert manual changes made outside Git
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
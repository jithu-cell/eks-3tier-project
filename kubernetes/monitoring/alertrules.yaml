apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudapp-alerts
  namespace: monitoring
  labels:
    release: prometheus-stack
    app: kube-prometheus-stack
spec:
  groups:
    - name: cloudapp.application
      interval: 30s
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(cloudapp_http_requests_total{status_code=~"5.."}[5m]))
            /
            sum(rate(cloudapp_http_requests_total[5m])) * 100 > 5
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: High HTTP error rate detected
            description: Error rate is {{ $value }}% (threshold 5%)

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(cloudapp_http_request_duration_ms_bucket[5m])) by (le)
            ) > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: API P99 latency exceeds 1 second
            description: P99 latency is {{ $value }}ms

        - alert: DatabaseErrors
          expr: rate(cloudapp_db_queries_total{status="error"}[5m]) > 0.1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Database queries are failing
            description: DB error rate is {{ $value }} errors/s

    - name: cloudapp.kubernetes
      interval: 60s
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="cloudapp"}[1h]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Pod {{ $labels.pod }} is crash looping
            description: Pod restarted {{ $value }} times in last hour

        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="cloudapp",condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Pod {{ $labels.pod }} is not ready

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="cloudapp"}
            != kube_deployment_status_available_replicas{namespace="cloudapp"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Deployment {{ $labels.deployment }} replica mismatch

    - name: cloudapp.nodes
      interval: 60s
      rules:
        - alert: NodeHighCPU
          expr: 100 - (avg by (instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Node {{ $labels.instance }} CPU over 85%
            description: CPU usage is {{ $value }}%

        - alert: NodeHighMemory
          expr: |
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
            / node_memory_MemTotal_bytes * 100 > 90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Node {{ $labels.instance }} memory over 90%
            description: Memory usage is {{ $value }}%
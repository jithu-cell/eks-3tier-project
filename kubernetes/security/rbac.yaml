apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: cloudapp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: cloudapp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: cloudapp
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list]
- apiGroups: [""]
  resources: [secrets]
  verbs: [get]
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rolebinding
  namespace: cloudapp
subjects:
- kind: ServiceAccount
  name: backend-sa
  namespace: cloudapp
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-role
  namespace: cloudapp
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-rolebinding
  namespace: cloudapp
subjects:
- kind: ServiceAccount
  name: frontend-sa
  namespace: cloudapp
roleRef:
  kind: Role
  name: frontend-role
  apiGroup: rbac.authorization.k8s.io
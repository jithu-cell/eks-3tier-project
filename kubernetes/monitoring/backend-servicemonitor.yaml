apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudapp-backend-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - cloudapp
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
version: '3.8'

services:

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: cloudapp-db
    environment:
      POSTGRES_DB:       cloudapp_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data  # data persists between restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

  # Node.js backend
  backend:
    build: .
    container_name: cloudapp-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:     development
      PORT:         3001
      DB_HOST:      postgres      # service name — NOT localhost
      DB_PORT:      5432
      DB_NAME:      cloudapp_db
      DB_USER:      postgres
      DB_PASSWORD:  postgres123
      JWT_SECRET:   local_dev_secret_change_in_production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy  # wait for DB to be ready
    restart: unless-stopped

volumes:
  pgdata:
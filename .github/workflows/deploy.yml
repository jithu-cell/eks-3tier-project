# ─────────────────────────────────────────────────────────────
# Full Stack Deploy Pipeline
# Runs after both frontend and backend pipelines pass
# Deploys to EKS by updating Kubernetes manifests
# ─────────────────────────────────────────────────────────────
name: Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  AWS_REGION:   eu-north-1
  CLUSTER_NAME: cloudapp-cluster

jobs:

  # ── Job 1: Build & Push Frontend ─────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Test
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          npm test -- --watchAll=false --passWithNoTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "short-sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & Push Frontend
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/cloudapp-frontend:${{ steps.meta.outputs.short-sha }}
          docker build -t $IMAGE ./frontend
          docker tag  $IMAGE ${{ steps.login-ecr.outputs.registry }}/cloudapp-frontend:latest
          docker push $IMAGE
          docker push ${{ steps.login-ecr.outputs.registry }}/cloudapp-frontend:latest

  # ── Job 2: Build & Push Backend ──────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Test
        working-directory: backend
        run: |
          npm install --legacy-peer-deps
          npm test
        env:
          NODE_ENV:   test
          JWT_SECRET: test_secret_for_ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "short-sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & Push Backend
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/cloudapp-backend:${{ steps.meta.outputs.short-sha }}
          docker build -t $IMAGE ./backend
          docker tag  $IMAGE ${{ steps.login-ecr.outputs.registry }}/cloudapp-backend:latest
          docker push $IMAGE
          docker push ${{ steps.login-ecr.outputs.registry }}/cloudapp-backend:latest

  # ── Job 3: Deploy to EKS ─────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "short-sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Update frontend image tag in manifest
        run: |
          FRONTEND_IMAGE=${{ steps.login-ecr.outputs.registry }}/cloudapp-frontend:${{ steps.meta.outputs.short-sha }}
          sed -i "s|image:.*cloudapp-frontend.*|image: $FRONTEND_IMAGE|g" \
            kubernetes/frontend/deployment.yaml

      - name: Update backend image tag in manifest
        run: |
          BACKEND_IMAGE=${{ steps.login-ecr.outputs.registry }}/cloudapp-backend:${{ steps.meta.outputs.short-sha }}
          sed -i "s|image:.*cloudapp-backend.*|image: $BACKEND_IMAGE|g" \
            kubernetes/backend/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/backend/
          kubectl apply -f kubernetes/frontend/
          kubectl apply -f kubernetes/ingress/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend-deployment -n cloudapp --timeout=300s
          kubectl rollout status deployment/backend-deployment  -n cloudapp --timeout=300s

      - name: Commit updated manifests back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/frontend/deployment.yaml kubernetes/backend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.meta.outputs.short-sha }}"
          git push

      - name: Deployment summary
        run: |
          echo "## Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ steps.meta.outputs.short-sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** ${{ steps.login-ecr.outputs.registry }}/cloudapp-frontend:${{ steps.meta.outputs.short-sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** ${{ steps.login-ecr.outputs.registry }}/cloudapp-backend:${{ steps.meta.outputs.short-sha }}" >> $GITHUB_STEP_SUMMARY

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — reduces file sizes by ~70%
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/javascript;
    gzip_min_length 1000;

    # CRITICAL for React Router
    # Without this: refreshing /dashboard returns 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets 1 year
    # (React adds content hashes to filenames automatically)
    location ~* \.(js|css|png|jpg|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-XSS-Protection       "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Hide nginx version from response headers
    server_tokens off;
}